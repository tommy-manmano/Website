<!DOCTYPE html>
<html>
<head>

    <title>Tommy Manmano Portfolio</title>
    <link rel="stylesheet" href="../css/main.css">

</head>
<body>

    <nav>
        <ul class="navbar">
            <li><a href ="home.html">Home</a></li>
            <li><a href ="contact.html">Contact and Links</a></li>
            <li><a href ="games.html">Games</a></li>
        </ul>
    </nav>
    <br>

    <div class="numGuessDiv">
        <h2>Number Guessing Game</h2>
        <p>Come up with a range of numbers, pick one within the range, and I will 
            try to guess your number.
        </p>

        <label for="lowerBound">Lower Bound: </label>
        <input type="number" id="lowerBound" name="lowerBound">
        
        <label for="upperBound">Upper Bound: </label>
        <input type="number" id="upperBound" name="upperBound">
        <br>
        
        <button id="startGameButton" type="button">
            Start Game
        </button>
        <button id="resetGameButton" type="button">
            Reset Game
        </button>

        <div id="guessSection" style="display: none; margin-top: 1rem;">
            <p id="guessPrompt"></p>
            <p id="boundaryInfo"></p>

            <button id="tooLowButton" type="button">Too low</button>
            <button id="correctButton" type="button">Correct</button>
            <button id="tooHighButton" type="button">Too high</button>

            <p id="feedbackMessage"></p>
        </div>
    </div>
    <script src="../js/games.js"></script>
</body>
</html>
